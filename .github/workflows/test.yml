name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  bats:
    name: bootstrap.sh (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bats
        uses: bats-core/bats-action@472edde1138d59aca53ff162fb8d996666d21e4a # 2.0.0

      - name: Run Bats tests
        run: bats scripts/tests/

  backup-tool:
    name: backup-tool (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/backup-tool
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Mypy strict
        run: uv run mypy src tests

      - name: Pytest
        run: uv run pytest --cov=backup_tool --cov-report=term-missing

  gitleaks:
    name: gitleaks (leak guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Bats
        uses: bats-core/bats-action@472edde1138d59aca53ff162fb8d996666d21e4a # 2.0.0

      - name: Install gitleaks
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" | tar -xz -C "$RUNNER_TEMP" gitleaks
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Validate gitleaks rules (bats)
        run: bats scripts/tests/gitleaks.bats

      # 履歴 (既知の過去パス) を蒸し返さないよう、PR/push の新規コミット範囲のみ走査する。
      # SHA は env 経由で渡し ${{ }} の script injection を避ける。
      - name: Scan new commits for leaks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ -n "$BASE_SHA" ]; then
            RANGE="$BASE_SHA..HEAD"
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            RANGE="$BEFORE_SHA..HEAD"
          else
            RANGE="HEAD~1..HEAD"
          fi
          echo "Scanning range: $RANGE"
          gitleaks git --log-opts="$RANGE" --redact --no-banner -c .gitleaks.toml

  config-guard:
    name: config-guard (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/config-guard
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Mypy strict
        run: uv run mypy src tests

      - name: Pytest
        run: uv run pytest -q

      # リポジトリ全体に対して guard を実行する（cwd は scripts/config-guard、引数は repo root）
      - name: Run config-guard on repo
        run: uv run config-guard ../..

  node-security-notifier:
    name: node-security-notifier (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/node-security-notifier
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Mypy strict
        run: uv run mypy src tests

      - name: Pytest
        run: uv run pytest -q

  tirith-hook:
    name: tirith-hook (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/tirith-hook
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      # フック本体は home/.claude/hooks/ にあるため repo ルート相対で lint/type 対象に含める。
      # 祖先に ruff/mypy 設定が混入しても tirith-hook の設定が勝つよう config を明示する。
      - name: Ruff check
        run: uv run ruff check --config pyproject.toml ../../home/.claude/hooks/tirith-check.py tests

      - name: Ruff format check
        run: uv run ruff format --check --config pyproject.toml ../../home/.claude/hooks/tirith-check.py tests

      - name: Mypy strict
        run: uv run mypy --config-file pyproject.toml ../../home/.claude/hooks/tirith-check.py tests

      - name: Pytest
        run: uv run pytest -q

  handoff-sentinel:
    name: handoff-sentinel (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/handoff-sentinel
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      # フック本体は home/.claude/hooks/ にあるため repo ルート相対で lint/type 対象に含める。
      # 祖先に ruff/mypy 設定が混入しても handoff-sentinel の設定が勝つよう config を明示する。
      - name: Ruff check
        run: uv run ruff check --config pyproject.toml ../../home/.claude/hooks/handoff-sentinel.py tests

      - name: Ruff format check
        run: uv run ruff format --check --config pyproject.toml ../../home/.claude/hooks/handoff-sentinel.py tests

      - name: Mypy strict
        run: uv run mypy --config-file pyproject.toml ../../home/.claude/hooks/handoff-sentinel.py tests

      - name: Pytest
        run: uv run pytest -q
