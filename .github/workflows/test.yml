name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bats:
    name: bootstrap.sh (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bats
        uses: bats-core/bats-action@2.0.0

      - name: Run Bats tests
        run: bats scripts/tests/

  backup-tool:
    name: backup-tool (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/backup-tool
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Mypy strict
        run: uv run mypy src tests

      - name: Pytest
        run: uv run pytest --cov=backup_tool --cov-report=term-missing
