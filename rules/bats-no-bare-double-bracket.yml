# bats の @test 本体は set -eE + trap ERR で走る。macOS 標準の bash 3.2 は
# 「@test 本体の最終文ではない位置」の裸の [[ ]] が偽でも ERR トラップを発火させない
# (bash 5.3 は発火する)。ローカルの bats は bash 3.2、CI は bash 5 で走るため、
# [[ ]] のままだと「CI では落ちるがローカルでは素通りする」アサーションが生まれる
# (実測: Task 1 の RED フェーズで実際に嘘の緑が出た)。
# scripts/tests/test_helper.bash の assert_contains / refute_contains 等、
# シェル関数呼び出し (単純コマンド) に置き換える。単一角括弧 [ ] や run 後の
# [ "$status" -eq N ] は対象外 (test builtin はどちらの bash でも ERR を発火させる)。
#
# 実現方法: 条件位置 (if / elif / while / until の条件) だけを除外し、それ以外の
# [[ ]] (文位置、statement position) を全て検出する。
#
# if_statement / while_statement の条件除外は stopBy: end を使う。stopBy: neighbor
# (直接の親だけを見る) だと [[ ]] の直接の親が if_statement / while_statement
# そのものではないケースを取りこぼし、errexit 対象外の安全な条件式を誤検知する。実測:
#   - `if ! [[ A ]]; then`               直接の親は negated_command
#   - `if [[ A ]] && [[ B ]]; then`      直接の親は list
#   - `while [[ A ]] && [[ B ]]; do`     直接の親は list
# いずれも neighbor では if_statement / while_statement に届かない。field: condition
# は保ったまま stopBy: end (祖先を最後まで遡る) にすると、negated_command や list に
# 包まれた条件式も条件位置として正しく拾える。then / do 節の本体は field 名を持たず
# field: condition の経路には繋がらないため、stopBy: end にしても本体側への漏れは
# 起きない (`if true; then [[ A ]]; fi` は変わらず検出される)。
#
# tree-sitter-bash の grammar.js を実測すると、if_statement は条件のみ
# field('condition', ...) で名前付けし、本体 (then 節) は無名で直下に置く。
# while_statement は条件・本体 (do_group) の両方を名前付けする。elif_clause は
# 条件・本体のどちらにも field 名が無く、直下の子として区別できない。
# そのため elif_clause 直下だけは stopBy: neighbor のまま丸ごと除外する。
#
# 既知のギャップ: elif の本体 (`elif true; then [[ A ]]; fi`) にある裸の [[ ]] は
# このルールでは検出できない。elif_clause は field 名で条件と本体を区別できず、
# 条件だけを狙い撃ちで除外する手段が無いため。合法な guard 記述 (`if ! [[ ]]` や
# `&&` 連結) を誤検知する方が、この検出漏れよりも害が大きいと判断してこの妥協を
# 選んだ。仮に elif 本体に空虚に緑となるアサーションが書かれても、CI の bash 5 では
# ERR トラップが正しく発火するため最終的には捕捉される。
#
# 既知のギャップ (その2、逆向きの誤検知、実測済み): elif の条件位置にある合法な
# guard 記述 `elif ! [[ A ]]; then` や `elif [[ A ]] && [[ B ]]; then` はエラー
# として誤検知される。elif_clause は field 名が無く stopBy: neighbor しか使えず、
# 条件が negated_command / list に包まれると直接の親が elif_clause でなくなり除外から漏れる。
id: bats-no-bare-double-bracket
language: bash
severity: error
files:
  - '**/*.bats'
rule:
  pattern: '[[ $A ]]'
  not:
    any:
      - inside:
          kind: if_statement
          field: condition
          stopBy: end
      - inside:
          kind: while_statement
          field: condition
          stopBy: end
      - inside:
          kind: elif_clause
          stopBy: neighbor
message: >-
  bats の @test 本体で裸の [[ ]] をアサーションとして使わない。
  macOS 標準の bash 3.2 は非最終行の [[ ]] が失敗しても ERR トラップを発火させず
  テストが空虚に緑になる (bash 5.3 は発火する)。
  scripts/tests/test_helper.bash の assert_contains / refute_contains などの
  シェル関数呼び出しに置き換える。
