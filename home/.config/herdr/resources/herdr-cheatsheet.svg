<svg xmlns="http://www.w3.org/2000/svg" width="1550" height="690" viewBox="0 0 1550 690" font-family="'Noto Sans CJK JP','Hiragino Sans','Yu Gothic',sans-serif">
<rect width="1550" height="690" rx="18" fill="#1e1e2e"/>
<text x="42" y="60" font-size="34" font-weight="700" fill="#cdd6f4">herdr チートシート</text>
<rect x="42" y="78" width="330" height="4" rx="2" fill="#cba6f7"/>
<text x="42" y="106" font-size="16" fill="#7f849c">prefix = Ctrl+b（例: prefix n は Ctrl+b → n）　S- = Shift　C- = Ctrl　Alt- = Option</text>
<rect x="42" y="132" width="470" height="226" rx="14" fill="#181825"/>
<path d="M56,132 h442 a14,14 0 0 1 14,14 v22 h-470 v-22 a14,14 0 0 1 14,-14 z" fill="#313244"/>
<rect x="62" y="142" width="6" height="16" rx="3" fill="#cba6f7"/>
<text x="78" y="157" font-size="19" font-weight="700" fill="#cba6f7">基本 / セッション</text>
<rect x="64" y="182" width="66" height="21" rx="6" fill="#45475a"/>
<text x="72" y="197" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">Ctrl+b</text>
<text x="214" y="197" font-size="15" fill="#bac2de">プレフィックスキー（先頭に押す）</text>
<rect x="64" y="209" width="84" height="21" rx="6" fill="#45475a"/>
<text x="72" y="224" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix ?</text>
<text x="214" y="224" font-size="15" fill="#bac2de">ヘルプを表示</text>
<rect x="64" y="236" width="84" height="21" rx="6" fill="#45475a"/>
<text x="72" y="251" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix s</text>
<text x="214" y="251" font-size="15" fill="#bac2de">設定を開く</text>
<rect x="64" y="263" width="84" height="21" rx="6" fill="#45475a"/>
<text x="72" y="278" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix q</text>
<text x="214" y="278" font-size="15" fill="#bac2de">セッションからデタッチ</text>
<rect x="64" y="290" width="101" height="21" rx="6" fill="#45475a"/>
<text x="72" y="305" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix S-r</text>
<text x="214" y="305" font-size="15" fill="#bac2de">config.toml を再読込</text>
<rect x="64" y="317" width="84" height="21" rx="6" fill="#45475a"/>
<text x="72" y="332" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix o</text>
<text x="214" y="332" font-size="15" fill="#bac2de">通知先の pane へ移動</text>
<rect x="42" y="380" width="470" height="253" rx="14" fill="#181825"/>
<path d="M56,380 h442 a14,14 0 0 1 14,14 v22 h-470 v-22 a14,14 0 0 1 14,-14 z" fill="#313244"/>
<rect x="62" y="390" width="6" height="16" rx="3" fill="#cba6f7"/>
<text x="78" y="405" font-size="19" font-weight="700" fill="#cba6f7">ワークスペース</text>
<rect x="64" y="430" width="84" height="21" rx="6" fill="#45475a"/>
<text x="72" y="445" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix w</text>
<text x="214" y="445" font-size="15" fill="#bac2de">ワークスペース選択</text>
<rect x="64" y="457" width="84" height="21" rx="6" fill="#45475a"/>
<text x="72" y="472" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix g</text>
<text x="214" y="472" font-size="15" fill="#bac2de">goto でジャンプ</text>
<rect x="64" y="484" width="101" height="21" rx="6" fill="#45475a"/>
<text x="72" y="499" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix S-n</text>
<text x="214" y="499" font-size="15" fill="#bac2de">新規ワークスペース</text>
<rect x="64" y="511" width="101" height="21" rx="6" fill="#45475a"/>
<text x="72" y="526" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix S-g</text>
<text x="214" y="526" font-size="15" fill="#bac2de">新規 worktree</text>
<rect x="64" y="538" width="101" height="21" rx="6" fill="#45475a"/>
<text x="72" y="553" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix S-w</text>
<text x="214" y="553" font-size="15" fill="#bac2de">名前を変更</text>
<rect x="64" y="565" width="101" height="21" rx="6" fill="#45475a"/>
<text x="72" y="580" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix S-d</text>
<text x="214" y="580" font-size="15" fill="#bac2de">閉じる</text>
<rect x="64" y="592" width="110" height="21" rx="6" fill="#45475a"/>
<text x="72" y="607" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix S-←→</text>
<text x="214" y="607" font-size="15" fill="#bac2de">前 / 次のワークスペース</text>
<rect x="540" y="132" width="470" height="199" rx="14" fill="#181825"/>
<path d="M554,132 h442 a14,14 0 0 1 14,14 v22 h-470 v-22 a14,14 0 0 1 14,-14 z" fill="#313244"/>
<rect x="560" y="142" width="6" height="16" rx="3" fill="#cba6f7"/>
<text x="576" y="157" font-size="19" font-weight="700" fill="#cba6f7">タブ</text>
<rect x="562" y="182" width="84" height="21" rx="6" fill="#45475a"/>
<text x="570" y="197" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix c</text>
<text x="712" y="197" font-size="15" fill="#bac2de">新規タブ</text>
<rect x="562" y="209" width="101" height="21" rx="6" fill="#45475a"/>
<text x="570" y="224" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix S-t</text>
<text x="712" y="224" font-size="15" fill="#bac2de">名前を変更</text>
<rect x="562" y="236" width="101" height="21" rx="6" fill="#45475a"/>
<text x="570" y="251" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix S-x</text>
<text x="712" y="251" font-size="15" fill="#bac2de">閉じる</text>
<rect x="562" y="263" width="118" height="21" rx="6" fill="#45475a"/>
<text x="570" y="278" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix p / n</text>
<text x="712" y="278" font-size="15" fill="#bac2de">前 / 次のタブ</text>
<rect x="562" y="290" width="110" height="21" rx="6" fill="#45475a"/>
<text x="570" y="305" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix 1..9</text>
<text x="712" y="305" font-size="15" fill="#bac2de">番号でタブ切替</text>
<rect x="540" y="353" width="470" height="226" rx="14" fill="#181825"/>
<path d="M554,353 h442 a14,14 0 0 1 14,14 v22 h-470 v-22 a14,14 0 0 1 14,-14 z" fill="#313244"/>
<rect x="560" y="363" width="6" height="16" rx="3" fill="#cba6f7"/>
<text x="576" y="378" font-size="19" font-weight="700" fill="#cba6f7">ペイン：移動・分割</text>
<rect x="562" y="403" width="136" height="21" rx="6" fill="#45475a"/>
<text x="570" y="418" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix h j k l</text>
<text x="712" y="418" font-size="15" fill="#bac2de">左 下 上 右のペインへ</text>
<rect x="562" y="430" width="101" height="21" rx="6" fill="#45475a"/>
<text x="570" y="445" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix Tab</text>
<text x="712" y="445" font-size="15" fill="#bac2de">次のペインへ巡回</text>
<rect x="562" y="457" width="118" height="21" rx="6" fill="#45475a"/>
<text x="570" y="472" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix S-Tab</text>
<text x="712" y="472" font-size="15" fill="#bac2de">前のペインへ巡回</text>
<rect x="562" y="484" width="84" height="21" rx="6" fill="#45475a"/>
<text x="570" y="499" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix v</text>
<text x="712" y="499" font-size="15" fill="#bac2de">縦に分割</text>
<rect x="562" y="511" width="84" height="21" rx="6" fill="#45475a"/>
<text x="570" y="526" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix -</text>
<text x="712" y="526" font-size="15" fill="#bac2de">横に分割</text>
<rect x="562" y="538" width="84" height="21" rx="6" fill="#45475a"/>
<text x="570" y="553" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix z</text>
<text x="712" y="553" font-size="15" fill="#bac2de">ズーム（全画面トグル）</text>
<rect x="1038" y="132" width="470" height="199" rx="14" fill="#181825"/>
<path d="M1052,132 h442 a14,14 0 0 1 14,14 v22 h-470 v-22 a14,14 0 0 1 14,-14 z" fill="#313244"/>
<rect x="1058" y="142" width="6" height="16" rx="3" fill="#cba6f7"/>
<text x="1074" y="157" font-size="19" font-weight="700" fill="#cba6f7">ペイン：操作</text>
<rect x="1060" y="182" width="84" height="21" rx="6" fill="#45475a"/>
<text x="1068" y="197" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix x</text>
<text x="1210" y="197" font-size="15" fill="#bac2de">ペインを閉じる</text>
<rect x="1060" y="209" width="84" height="21" rx="6" fill="#45475a"/>
<text x="1068" y="224" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix r</text>
<text x="1210" y="224" font-size="15" fill="#bac2de">リサイズモード</text>
<rect x="1060" y="236" width="101" height="21" rx="6" fill="#45475a"/>
<text x="1068" y="251" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix S-p</text>
<text x="1210" y="251" font-size="15" fill="#bac2de">ペイン名を変更</text>
<rect x="1060" y="263" width="84" height="21" rx="6" fill="#45475a"/>
<text x="1068" y="278" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix e</text>
<text x="1210" y="278" font-size="15" fill="#bac2de">スクロールバックを編集</text>
<rect x="1060" y="290" width="84" height="21" rx="6" fill="#45475a"/>
<text x="1068" y="305" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix b</text>
<text x="1210" y="305" font-size="15" fill="#bac2de">サイドバー表示切替</text>
<rect x="1038" y="353" width="470" height="172" rx="14" fill="#181825"/>
<path d="M1052,353 h442 a14,14 0 0 1 14,14 v22 h-470 v-22 a14,14 0 0 1 14,-14 z" fill="#313244"/>
<rect x="1058" y="363" width="6" height="16" rx="3" fill="#cba6f7"/>
<text x="1074" y="378" font-size="19" font-weight="700" fill="#cba6f7">ダイレクトキー（prefix 不要）</text>
<rect x="1060" y="403" width="75" height="21" rx="6" fill="#45475a"/>
<text x="1068" y="418" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">Alt+Tab</text>
<text x="1210" y="418" font-size="15" fill="#bac2de">次のタブへ</text>
<rect x="1060" y="430" width="92" height="21" rx="6" fill="#45475a"/>
<text x="1068" y="445" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">S-Alt+Tab</text>
<text x="1210" y="445" font-size="15" fill="#bac2de">前のタブへ</text>
<rect x="1060" y="457" width="110" height="21" rx="6" fill="#45475a"/>
<text x="1068" y="472" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">C-Alt+] / [</text>
<text x="1210" y="472" font-size="15" fill="#bac2de">ペイン巡回 次 / 前</text>
<rect x="1060" y="484" width="127" height="21" rx="6" fill="#45475a"/>
<text x="1068" y="499" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">C-S-Alt+] / [</text>
<text x="1210" y="499" font-size="15" fill="#bac2de">前 / 次のワークスペース</text>
<rect x="1038" y="547" width="470" height="91" rx="14" fill="#181825"/>
<path d="M1052,547 h442 a14,14 0 0 1 14,14 v22 h-470 v-22 a14,14 0 0 1 14,-14 z" fill="#313244"/>
<rect x="1058" y="557" width="6" height="16" rx="3" fill="#cba6f7"/>
<text x="1074" y="572" font-size="19" font-weight="700" fill="#cba6f7">エージェント / 未読</text>
<rect x="1060" y="597" width="101" height="21" rx="6" fill="#45475a"/>
<text x="1068" y="612" font-size="15" font-family="'DejaVu Sans Mono','SFMono-Regular',Menlo,monospace" fill="#f5c2e7">prefix S-u</text>
<text x="1210" y="612" font-size="15" fill="#bac2de">未読へ順送り（blocked→done）</text>
<text x="42" y="668" font-size="14" fill="#7f849c">herdr 0.7.1／config.toml のバインドを反映（コメント＝デフォルト有効）。数字キーはタブ直接切替。</text>
</svg>
