# herdr-file-viewer の設定。既定値と全設定キーの説明は plugin 同梱の
# config.example.toml と docs/keys.md が真実源
# (場所は `herdr plugin config-dir herdr-file-viewer` で確認できる)。
# ここには既定から変えたキーと、そう決めた理由だけを置く。

# e は viewer を suspend して端末を子に明け渡す blocking 経路 (docs/keys.md)。
# 端末を直接使い編集の終了までブロックするエディタが要るため nvim を割り当てる。
editor = "nvim"
