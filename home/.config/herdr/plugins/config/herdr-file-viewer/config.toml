# herdr-file-viewer の設定。既定値と全設定キーの説明は plugin 同梱の
# config.example.toml と docs/keys.md が真実源
# (場所は `herdr plugin config-dir herdr-file-viewer` で確認できる)。
# ここには既定から変えたキーと、そう決めた理由だけを置く。

# e は viewer を suspend して端末を子に明け渡す blocking 経路、O は viewer を
# 保ったまま返る非 blocking 経路 (docs/keys.md)。この非対称に合わせて、TUI の
# nvim を e に、GUI の Zed を O に割り当てる。逆にすると viewer が Zed の終了を
# 待ち続けて固まる。
editor = "nvim"

# O は macOS 既定の `open` を置き換えるため、画像や PDF も Preview ではなく Zed
# へ渡る。Finder で開きたいときは R (reveal) が既定のまま残っている。
# O は起動後の失敗を報告しないので、開かないときは zed 単体で切り分ける。
open = "zed"
