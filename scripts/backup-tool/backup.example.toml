# =============================================================================
# バックアップツール設定ファイル (テンプレート)
# =============================================================================
# このファイルをコピーして backup.toml として保存し、自分の環境に合わせて
# 編集してください。
#
#   cp backup.example.toml backup.toml
#
# このファイル (backup.example.toml) 自体はテンプレートとして残しておくことを
# 推奨します。
# =============================================================================

# -----------------------------------------------------------------------------
# 最低限確保しておきたいマージン (GB)
# -----------------------------------------------------------------------------
# 容量チェックは「バックアップ先の総容量 >= ソースデータ + マージン」で判定します。
# rsync の --delete-before により転送前に不要ファイルが削除されるため、
# 「現在の空き容量」ではなく「総容量」ベースで判定しています。
#
# 推奨値:
#   大量の写真・イラストを扱う場合    : 200
#   一般的な用途 (デフォルト)         : 100
#   小規模な変更のみの場合            : 50
minimum_free_space_gb = 100

# -----------------------------------------------------------------------------
# ログファイルの保持期間 (日数)
# -----------------------------------------------------------------------------
# この日数より古い backup_*.log を起動時に自動削除します。
log_retention_days = 90

# -----------------------------------------------------------------------------
# ログディレクトリ (省略可)
# -----------------------------------------------------------------------------
# 未指定時は設定ファイルと同じ階層の .backup_logs/ に出力します。
# log_base_dir = "/Volumes/Primary/.backup_logs"

# -----------------------------------------------------------------------------
# エラー時の動作 (省略可)
# -----------------------------------------------------------------------------
# "continue" : エラーが出ても次のペアを処理する (デフォルト)
# "stop"     : 最初のエラーで停止する
# error_behavior = "continue"

# -----------------------------------------------------------------------------
# 追加の除外パターン (省略可)
# -----------------------------------------------------------------------------
# .DS_Store や ._* などの基本除外リストに加えて、全ペア共通で除外したい
# パターンを追加する場合に指定します。
#
# additional_excludes = [
#     "node_modules",
#     ".venv",
#     "*.log",
# ]
additional_excludes = []

# -----------------------------------------------------------------------------
# バックアップペアの定義 (必須・1 つ以上)
# -----------------------------------------------------------------------------
# name        : 識別用の名前 (ログに出力される)
# source      : バックアップ元のボリュームまたはディレクトリ
# destination : バックアップ先のボリュームまたはディレクトリ
# excludes    : このペア固有の除外パターン (省略可)
#
# 例:
# [[backup_pairs]]
# name = "メインSSD"
# source = "/Volumes/Primary"
# destination = "/Volumes/Secondary"
#
# [[backup_pairs]]
# name = "写真フォルダ"
# source = "/Volumes/Data/Photos"
# destination = "/Volumes/Backup/Photos"
# excludes = ["*.tmp", "cache/"]

[[backup_pairs]]
name = "<ペア名>"
source = "/Volumes/<SOURCE>"
destination = "/Volumes/<DESTINATION>"
