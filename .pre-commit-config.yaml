# pre-commit 設定
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# セットアップ:
#   brew install pre-commit gitleaks ast-grep shellcheck
#   pre-commit install
#
# - scripts/ 配下の Python ツールの ruff / mypy / pytest を uv 仮想環境で実行する (対象は下の hook 定義が真実源)。
# - config-guard で skills / committed settings.json の stale なツール名参照・構造逸脱を検出する。
# - gitleaks で staged 差分の secret / ユーザー名パス (/Users/<name>) 漏洩を弾く (.gitleaks.toml)。
# - ast-grep で一般的な linter で表現できない構文レベルのルール (rules/) を検査する (sgconfig.yml)。
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

repos:
  - repo: local
    hooks:
      - id: backup-tool-ruff-check
        name: backup-tool ruff check
        language: system
        entry: uv run --directory scripts/backup-tool ruff check src tests
        pass_filenames: false
        files: ^scripts/backup-tool/(src|tests)/.*\.py$

      - id: backup-tool-ruff-format
        name: backup-tool ruff format --check
        language: system
        entry: uv run --directory scripts/backup-tool ruff format --check src tests
        pass_filenames: false
        files: ^scripts/backup-tool/(src|tests)/.*\.py$

      - id: backup-tool-mypy
        name: backup-tool mypy
        language: system
        entry: uv run --directory scripts/backup-tool mypy src tests
        pass_filenames: false
        files: ^scripts/backup-tool/(src|tests)/.*\.py$

      - id: backup-tool-pytest
        name: backup-tool pytest
        language: system
        entry: uv run --directory scripts/backup-tool pytest -q
        pass_filenames: false
        files: ^scripts/backup-tool/(src|tests)/.*\.py$

      - id: config-guard-ruff-check
        name: config-guard ruff check
        language: system
        entry: uv run --directory scripts/config-guard ruff check src tests
        pass_filenames: false
        files: ^scripts/config-guard/(src|tests)/.*\.py$

      - id: config-guard-ruff-format
        name: config-guard ruff format --check
        language: system
        entry: uv run --directory scripts/config-guard ruff format --check src tests
        pass_filenames: false
        files: ^scripts/config-guard/(src|tests)/.*\.py$

      - id: config-guard-mypy
        name: config-guard mypy
        language: system
        entry: uv run --directory scripts/config-guard mypy src tests
        pass_filenames: false
        files: ^scripts/config-guard/(src|tests)/.*\.py$

      - id: config-guard-pytest
        name: config-guard pytest
        language: system
        entry: uv run --directory scripts/config-guard pytest -q
        pass_filenames: false
        files: ^scripts/config-guard/(src|tests)/.*\.py$

      - id: config-guard-scan
        name: config-guard scan (リポジトリ設定の静的検査)
        language: system
        entry: bash -c 'uv run --directory scripts/config-guard config-guard "$(git rev-parse --show-toplevel)"'
        pass_filenames: false
        files: ^(home/\.claude/skills/.*/SKILL\.md|home/\.claude/settings\.json|home/apm\.lock\.yaml|home/\.gitignore|home/\.config/herdr/config\.toml|scripts/config-guard/.*)$

      - id: mise-update-notifier-ruff-check
        name: mise-update-notifier ruff check
        language: system
        entry: uv run --directory scripts/mise-update-notifier ruff check src tests
        pass_filenames: false
        files: ^scripts/mise-update-notifier/(src|tests)/.*\.py$

      - id: mise-update-notifier-ruff-format
        name: mise-update-notifier ruff format --check
        language: system
        entry: uv run --directory scripts/mise-update-notifier ruff format --check src tests
        pass_filenames: false
        files: ^scripts/mise-update-notifier/(src|tests)/.*\.py$

      - id: mise-update-notifier-mypy
        name: mise-update-notifier mypy
        language: system
        entry: uv run --directory scripts/mise-update-notifier mypy src tests
        pass_filenames: false
        files: ^scripts/mise-update-notifier/(src|tests)/.*\.py$

      - id: mise-update-notifier-pytest
        name: mise-update-notifier pytest
        language: system
        entry: uv run --directory scripts/mise-update-notifier pytest -q
        pass_filenames: false
        files: ^scripts/mise-update-notifier/(src|tests)/.*\.py$

      - id: node-security-notifier-ruff-check
        name: node-security-notifier ruff check
        language: system
        entry: uv run --directory scripts/node-security-notifier ruff check src tests
        pass_filenames: false
        files: ^scripts/node-security-notifier/(src|tests)/.*\.py$

      - id: node-security-notifier-ruff-format
        name: node-security-notifier ruff format --check
        language: system
        entry: uv run --directory scripts/node-security-notifier ruff format --check src tests
        pass_filenames: false
        files: ^scripts/node-security-notifier/(src|tests)/.*\.py$

      - id: node-security-notifier-mypy
        name: node-security-notifier mypy
        language: system
        entry: uv run --directory scripts/node-security-notifier mypy src tests
        pass_filenames: false
        files: ^scripts/node-security-notifier/(src|tests)/.*\.py$

      - id: node-security-notifier-pytest
        name: node-security-notifier pytest
        language: system
        entry: uv run --directory scripts/node-security-notifier pytest -q
        pass_filenames: false
        files: ^scripts/node-security-notifier/(src|tests)/.*\.py$

      - id: tirith-hook-ruff-check
        name: tirith-hook ruff check
        language: system
        entry: uv run --directory scripts/tirith-hook ruff check --config pyproject.toml ../../home/.claude/hooks/tirith-check.py tests
        pass_filenames: false
        files: ^(home/\.claude/hooks/tirith-check\.py|scripts/tirith-hook/.*)$

      - id: tirith-hook-ruff-format
        name: tirith-hook ruff format --check
        language: system
        entry: uv run --directory scripts/tirith-hook ruff format --check --config pyproject.toml ../../home/.claude/hooks/tirith-check.py tests
        pass_filenames: false
        files: ^(home/\.claude/hooks/tirith-check\.py|scripts/tirith-hook/.*)$

      - id: tirith-hook-mypy
        name: tirith-hook mypy
        language: system
        entry: uv run --directory scripts/tirith-hook mypy --config-file pyproject.toml ../../home/.claude/hooks/tirith-check.py tests
        pass_filenames: false
        files: ^(home/\.claude/hooks/tirith-check\.py|scripts/tirith-hook/.*)$

      - id: tirith-hook-pytest
        name: tirith-hook pytest
        language: system
        entry: uv run --directory scripts/tirith-hook pytest -q
        pass_filenames: false
        files: ^(home/\.claude/hooks/tirith-check\.py|scripts/tirith-hook/.*)$

      - id: handoff-sentinel-ruff-check
        name: handoff-sentinel ruff check
        language: system
        entry: uv run --directory scripts/handoff-sentinel ruff check --config pyproject.toml ../../home/.claude/hooks/handoff-sentinel.py tests
        pass_filenames: false
        files: ^(home/\.claude/hooks/handoff-sentinel\.py|scripts/handoff-sentinel/.*)$

      - id: handoff-sentinel-ruff-format
        name: handoff-sentinel ruff format --check
        language: system
        entry: uv run --directory scripts/handoff-sentinel ruff format --check --config pyproject.toml ../../home/.claude/hooks/handoff-sentinel.py tests
        pass_filenames: false
        files: ^(home/\.claude/hooks/handoff-sentinel\.py|scripts/handoff-sentinel/.*)$

      - id: handoff-sentinel-mypy
        name: handoff-sentinel mypy
        language: system
        entry: uv run --directory scripts/handoff-sentinel mypy --config-file pyproject.toml ../../home/.claude/hooks/handoff-sentinel.py tests
        pass_filenames: false
        files: ^(home/\.claude/hooks/handoff-sentinel\.py|scripts/handoff-sentinel/.*)$

      - id: handoff-sentinel-pytest
        name: handoff-sentinel pytest
        language: system
        entry: uv run --directory scripts/handoff-sentinel pytest -q
        pass_filenames: false
        files: ^(home/\.claude/hooks/handoff-sentinel\.py|scripts/handoff-sentinel/.*)$

      - id: gitleaks
        name: gitleaks (secret / user-path leak guard)
        language: system
        entry: gitleaks git --staged --redact --no-banner -c .gitleaks.toml
        pass_filenames: false
        always_run: true

      - id: ast-grep-scan
        name: ast-grep scan (構文レベル lint / rules)
        language: system
        entry: ast-grep scan --no-ignore hidden
        pass_filenames: false
        files: ^(.*\.bats|.*\.lua|sgconfig\.yml|rules/.*)$

      - id: ast-grep-test
        name: ast-grep test (rule 分類テスト)
        language: system
        entry: ast-grep test --skip-snapshot-tests
        pass_filenames: false
        files: ^(sgconfig\.yml|rules/.*|rule-tests/.*)$

      # .sh の静的解析。CLAUDE.md の「警告0/ノイズ0」を prose でなくツールで担保する。
      # .bats は bats 構文 (@test) を shellcheck がパースできないため対象外 (files で .sh のみ)。
      # CI (.github/workflows/test.yml の shellcheck job) でもミラーし --no-verify を backstop する。
      # local hook は language:system で dev の brew shellcheck を使う。CI 側は同 version を
      # download+verify で pin し (test.yml, gitleaks と同じ「開発機と揃える」)、ubuntu 同梱の
      # 古い版との警告集合 drift (SC2120 の FP 等) を防ぐ。
      - id: shellcheck
        name: shellcheck (.sh static analysis)
        language: system
        entry: shellcheck
        files: \.sh$

  # 標準 hook。CLAUDE.md の「末尾は改行1つ」「行末空白なし/ノイズ0」を prose でなくツールで担保する。
  # この2 hook は cosmetic (機能に無影響) ゆえ pre-commit-only とし CI ミラーは張らない (--no-verify で main に
  # 載っても実害なく次に当該ファイルを pre-commit 経由で編集した時に是正)。実バグ検出値のある shellcheck のみ CI backstop を持つ。
  # exclude: svg は text/XML ゆえ types:[text] に該当し正規化対象になるので除外が要る。
  # png/af は identify が binary 判定し既に除外されるが、拡張子未登録の af は内容判定依存のため明示で破損を防ぐ。
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: cef0300fd0fc4d2a87a85fa2093c6b283ea36f4b  # frozen: v5.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: &asset_exclude '\.(png|af|svg)$'
      - id: trailing-whitespace
        exclude: *asset_exclude
